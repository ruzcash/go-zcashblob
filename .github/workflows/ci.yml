name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        go-version: ["1.22.x", "stable"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go-version }}
          cache: false
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
