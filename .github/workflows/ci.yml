name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local

jobs:
  compatibility:
    name: Test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-minimum
            os: ubuntu-latest
            go-version: 1.22.x
          - label: linux-oldstable
            os: ubuntu-latest
            go-version: oldstable
          - label: linux-stable
            os: ubuntu-latest
            go-version: stable
          - label: windows-stable
            os: windows-latest
            go-version: stable
          - label: macos-stable
            os: macos-latest
            go-version: stable
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: false

      - name: Test
        run: go test -count=1 ./...
        env:
          CGO_ENABLED: "0"
          GOFLAGS: -mod=readonly

  architecture:
    name: Compile (linux/386)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          cache: false

      - name: Compile tests
        run: go test -c -o /tmp/go-zcashblob-linux-386.test .
        env:
          CGO_ENABLED: "0"
          GOARCH: "386"
          GOOS: linux
          GOFLAGS: -mod=readonly

  quality:
    name: Quality, race, and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COVERAGE_MIN: "98.0"
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          cache: false

      - name: Run local quality gate
        run: make check

      - name: Add coverage summary
        shell: bash
        run: |
          total="$(cat coverage-total.txt)"
          printf '### Coverage\n\n%s%% (minimum %s%%)\n' \
            "$total" "$COVERAGE_MIN" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt
            coverage.html
            coverage-total.txt
          if-no-files-found: error
          retention-days: 30

  fuzz-smoke:
    name: Fuzz smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        target: [FuzzParse, FuzzCompactSize]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          cache: false

      - name: Run fuzz smoke test
        run: make fuzz-smoke FUZZ_TARGETS="${FUZZ_TARGET}"
        env:
          FUZZ_TARGET: ${{ matrix.target }}

  ci-success:
    name: CI success
    if: ${{ always() }}
    needs: [compatibility, architecture, quality, fuzz-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every CI job
        env:
          COMPATIBILITY_RESULT: ${{ needs.compatibility.result }}
          ARCHITECTURE_RESULT: ${{ needs.architecture.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          FUZZ_SMOKE_RESULT: ${{ needs.fuzz-smoke.result }}
        run: |
          test "$COMPATIBILITY_RESULT" = success
          test "$ARCHITECTURE_RESULT" = success
          test "$QUALITY_RESULT" = success
          test "$FUZZ_SMOKE_RESULT" = success
