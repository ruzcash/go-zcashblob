name: Extended fuzzing

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: extended-fuzz-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }} for 10 minutes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: [FuzzParse, FuzzCompactSize]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          cache: false

      - name: Run extended fuzzing
        shell: bash
        run: >-
          go test -run='^$' -fuzz="^${FUZZ_TARGET}$"
          -fuzztime=10m -parallel=2 .
        env:
          CGO_ENABLED: "0"
          FUZZ_TARGET: ${{ matrix.target }}
          GOFLAGS: -mod=readonly

      - name: Upload failing fuzz input
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: failing-input-${{ matrix.target }}
          path: testdata/fuzz/${{ matrix.target }}/
          if-no-files-found: ignore
          retention-days: 30
