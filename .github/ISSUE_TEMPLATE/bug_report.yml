name: Bug report
description: Report reproducible incorrect behavior in the library
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem. For a suspected vulnerability, stop here and use the private process in SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Library version
      description: Provide a release version or commit hash.
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Paste the output of `go version`.
      placeholder: go version go1.24.5 linux/amd64
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: Linux amd64, macOS arm64, Windows amd64
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include a small Go program or test and any sanitized transaction bytes needed to reproduce the problem.
      render: go
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the complete error or panic output when applicable.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add anything else that helps explain the report. Remove secrets and private transaction data.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: This report does not disclose an unpatched vulnerability.
          required: true
